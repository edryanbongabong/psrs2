<form method="post" action="">
  {% csrf_token %}

  <div class="modal-header bg-{{ options.theme_color }}">
    <h5 class="modal-title my-0">{{ mode|title }} {{ segment|title}}</h5>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>

  <div class="modal-body">
    <p>Are you sure you want to delete the item with title <strong>{{ object_name }}</strong>?</p>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
    <button type="submit" class="btn btn-danger">{{ mode|title }}</button>
  </div>

</form>
