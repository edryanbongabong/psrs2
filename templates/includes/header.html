{% load static %}

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="x-ua-compatible" content="ie=edge">

  {% if title %}
  <title>{{ options.app_brand }} - {{ title }}</title>
  {% else %}
  <title>{{ options.app_brand }}</title>
  {% endif %}
  <!-- Favicon -->
  <link rel="icon" href="{{ options.app_logo.url }}" type="image/png" sizes="16x16">
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="{% static 'admin-lte/plugins/fontawesome-free/css/all.min.css' %}">
  <!-- Google Font: Assistant -->
  <link rel="stylesheet" href="{% static 'fonts/assistant.css' %}">
  <!-- Select2 -->
  <link rel="stylesheet" href="{% static 'admin-lte/plugins/select2/css/select2.min.css' %}">
  <!-- SweetAlert2 -->
  <link rel="stylesheet" href="{% static 'admin-lte/plugins/sweetalert2-theme-bootstrap-4/bootstrap-4.min.css' %}">
  <!-- pace-progress -->
  <link rel="stylesheet" href="{% static 'admin-lte/plugins/pace-progress/themes/black/pace-theme-minimal.css' %}">
  <!-- summernote -->
  <link rel="stylesheet" href="{% static 'admin-lte/plugins/summernote/summernote-bs4.css' %}">
  <!-- icheck bootstrap -->
  <link rel="stylesheet" href="{% static 'admin-lte/plugins/icheck-bootstrap/icheck-bootstrap.min.css' %}">
  <!-- Ajax Datatables -->
  <link rel="stylesheet" href="{% static 'ajax_datatable/css/style.css' %}">
  <!-- Datatables -->
  <link rel="stylesheet" href="{% static 'admin-lte/plugins/datatables-bs4/css/dataTables.bootstrap4.min.css' %}">
  <!-- Theme style -->
  <link rel="stylesheet" href="{% static 'admin-lte/dist/css/adminlte.min.css' %}">
  <!-- Custom CSS -->
  <link href="{% static 'css/custom.css' %}" rel="stylesheet">
</head>
